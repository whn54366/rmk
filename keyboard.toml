# RMK keyboard.toml configuration file

# Keyboard device configuration
[keyboard]
name = "whn_ff Keyboard"       # Display name for your keyboard
vendor_id = 0xABCD                # USB vendor ID (Placeholder, you can change this)
product_id = 0x1234               # USB product ID (Placeholder, you can change this)
manufacturer = "whn54366"         # Manufacturer string
board = "nice!nano_v2"          # Target development board (Based on your ZMK setup)
serial_number = "vial:f64c2b3c"   # Enable Vial recognition
usb_enable = true                 # Enable USB functionality (default is true)

# Keyboard and Matrix configuration
[matrix]
# Define matrix pins
# For nRF52, the format is P0_XX or P1_XX
row_pins = ["P1_07", "P1_02", "P1_01"]
col_pins = ["P0_09", "P0_10", "P1_11", "P1_06", "P1_04", "P0_11", "P1_00"]

# RMK uses col2row as the default matrix diode direction.
# If your schematic requires row2col, add `row2col = true`.
# Based on your ZMK configuration and "diode cathode on rows", col2row is appropriate.
# row2col = true # Uncomment if your matrix is row2col

# Debouncer mode: "default" or "fast"
# "default" uses a counter-based algorithm.
# "fast" reacts instantly to a key press and waits briefly before the next input.
# debouncer = "fast" # Uncomment to use fast debouncer

# Layout configuration (example, you'll need to customize this)
[layout]
rows = 3
cols = 7
layers = 1
# Define your default keymap.
# Keycodes are typically defined as a 2D array matching your matrix dimensions.
# Use standard HID keycodes or RMK's special keycodes.
# This is a placeholder based on your 3x7 matrix.
# You will need to fill in the actual keycodes.
# Example: KC_A for 'A', KC_TRNS for transparent (pass to lower layer), etc.
default_keymap = [
    ["KC_Q", "KC_W", "KC_E", "KC_R", "KC_T", "KC_Y", "KC_U"],
    ["KC_A", "KC_S", "KC_D", "KC_F", "KC_G", "KC_H", "KC_J"],
    ["KC_Z", "KC_X", "KC_C", "KC_V", "KC_B", "KC_N", "KC_M"]
]

# Layers can be defined here, similar to ZMK
# Example:
# [[layers]]
# name = "Layer 1"
# bindings = [
#     ["KC_ESC", "KC_1", "KC_2", "KC_3", "KC_4", "KC_5", "KC_6"],
#     ["KC_TAB", "KC_Q", "KC_W", "KC_E", "KC_R", "KC_T", "KC_Y"],
#     ["KC_LSFT", "KC_A", "KC_S", "KC_D", "KC_F", "KC_G", "KC_H"]
# ]

# You can also configure other sections like:
# [split] for split keyboards
# [storage] for on-board configuration
# [behavior] for advanced key behaviors (Tap-Hold, TapDance, etc.)
# [input_devices] for encoders, joysticks
# [wireless] for Bluetooth settings
# [lighting] for RGB lighting


# For full details on all configuration options, refer to the RMK documentation:
# https://rmk.rs/main/docs/configuration/

# BLE (Bluetooth Low Energy) configuration
[ble]
enabled = true # 启用蓝牙功能

# nRF52840 的电池电量读取引脚，"vddh" 表示直接测量微控制器电源引脚
battery_adc_pin = "vddh"
# ADC 分压器设置，nice!nano 通常使用 806kΩ 和 2MΩ 电阻。
# saadc 测量的是 2MΩ 电阻上的电压，所以设置为 2000 和 2806 (假设 2M 为 2000k，总和为 2806k)
adc_divider_measured = 2000
adc_divider_total = 2806

# 设置 BLE 发射功率；数值越大信号越好，但功耗越高。nRF52840 的最大发射功率是 8。
default_tx_power = 0 # 默认值为 0，您可以根据需要调整

# 是否启用 2M PHY，默认为 true。
ble_use_2m_phy = true
