# RMK keyboard.toml configuration file

# Keyboard device configuration
[keyboard]
name = "whn_ff Keyboard"       # Keyboard name
product_name = "whn_ff Keyboard" # Display name of this keyboard
vendor_id = 0xABCD
product_id = 0x1234
manufacturer = "whn54366"
serial_number = "vial:f64c2b3c:000001"
# The chip or existing board used in keyboard
# Either "board" or "chip" can be set, but not both
chip = "nrf52840"
# board = "nice!nano_v2"          # Pre-configured board
usb_enable = true                 # Enable USB functionality (default is true)

# Keyboard and Matrix configuration
[matrix]
# Define matrix pins
# For nRF52, the format is P0_XX or P1_XX
row_pins = ["P1_07", "P1_02", "P1_01"]
col_pins = ["P0_09", "P0_10", "P1_11", "P1_06", "P0_11", "P1_04", "P1_00"]
# 核心适配：行接阴极，开启 row2col
row2col = true

# Debouncer mode: "default" or "fast"
# "default" uses a counter-based algorithm.
# "fast" reacts instantly to a key press and waits briefly before the next input.
# debouncer = "fast" # Uncomment to use fast debouncer

# Layout configuration
[layout]
rows = 3
cols = 7
layers = 3  # 支持 MO(1)/MO(2) 层切换
# 矩阵映射：完整3×7，对应所有物理/空位置
matrix_map = "(0,0,R) (0,1,R) (0,2,R) (0,3,R) (0,4,R) (0,5,R) (0,6,R) (1,0,R) (1,1,R) (1,2,R) (1,3,R) (1,4,R) (1,5,R) (1,6,R) (2,0,R) (2,1,R) (2,2,R) (2,3,R) (2,4,R) (2,5,R) (2,6,R)"

# Key map definitions per layer.
# 基础层（层0）：严格匹配你要求的键位，空位置用 No
[[layer]]
name = "base_layer" # Optional name for the layer
keys = "F1 F3 F7 No No No MO(1) No W No I O P MO(2) A S D H J K L"

# 层1（切换键 MO(1) 对应的空层，可后续自定义）
[[layer]]
name = "layer1"
keys = "No No No No No No No No No No No No No No No No No No No No No"

# 层2（功能键 MO(2) 对应的空层，可后续自定义）
[[layer]]
name = "layer2"
keys = "No No No No No No No No No No No No No No No No No No No No No"

# BLE (Bluetooth Low Energy) configuration
[ble]
enabled = true # 启用蓝牙功能
# nRF52840 的电池电量读取引脚，"vddh" 表示直接测量微控制器电源引脚
battery_adc_pin = "vddh"
# ADC 分压器设置，nice!nano 通常使用 806kΩ 和 2MΩ 电阻。
# saadc 测量的是 2MΩ 电阻上的电压，所以设置为 2000 和 2806 (假设 2M 为 2000k，总和为 2806k)
adc_divider_measured = 2000
adc_divider_total = 2806
# 设置 BLE 发射功率；数值越大信号越好，但功耗越高。nRF52840 的最大发射功率是 8。
default_tx_power = 0 # 默认值为 0，您可以根据需要调整
# 是否启用 2M PHY，默认为 true。
ble_use_2m_phy = true

# Host-side tools configuration
[host]
# Whether Vial is enabled (default: true)
vial_enabled = true
# The unlock keys are the combo of the row 0, col 0 key and
# the row 0, col 1 key
unlock_keys = [[0, 0], [0, 1]]

# RMK internal configuration
[rmk]
# Mouse key interval (ms) - controls mouse movement speed
mouse_key_interval = 20
# Mouse wheel interval (ms) - controls scrolling speed
mouse_wheel_interval = 80
# Maximum number of combos keyboard can store
combo_max_num = 8
# Maximum number of keys pressed simultaneously in a combo
combo_max_length = 4
# Maximum number of forks for conditional key actions
fork_max_num = 8
# Maximum number of morse keys keyboard can store (max 256)
morse_max_num = 8
# Maximum number of patterns a morse key can handle
max_patterns_per_key = 36
# Macro space size in bytes for storing sequences
macro_space_size = 256
# Default debounce time in ms
debounce_time = 20
# Event channel size
event_channel_size = 16
# Controller event channel size
controller_channel_size = 16
# Number of publishers to controllers
controller_channel_pubs = 12
# Number of controllers (subscribers)
controller_channel_subs = 8
# Report channel size
report_channel_size = 16
# Vial channel size
vial_channel_size = 4
# Flash channel size
flash_channel_size = 4
# The number of the split peripherals
split_peripherals_num = 1
# The number of available BLE profiles
ble_profiles_num = 3
# BLE Split Central sleep timeout in seconds (0 = disabled)
split_central_sleep_timeout_seconds = 0

# Chip-specific configuration
# To use the default configuration, ignore this section completely
# Use chip-specific sections like [chip.nrf52840] for chip-specific settings
[chip.nrf52840]
# DCDC regulator 0 enabled (nrf52840 only, default: true)
dcdc_reg0 = true
# DCDC regulator 1 enabled (nrf52840, nrf52833, default: true)
dcdc_reg1 = true
# DCDC regulator 0 voltage (nrf52840 only, default: "3V3")
dcdc_reg0_voltage = "3V3"
