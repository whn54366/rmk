# RMK keyboard.toml（恢复row2col默认 + 交换行/列引脚）
[keyboard]
name = "whn_ff Keyboard"
product_name = "whn_ff Keyboard"
vendor_id = 0xABCD
product_id = 0x1234
manufacturer = "whn54366"
serial_number = "vial:f64c2b3c:000001"
chip = "nrf52840"
usb_enable = true

# 核心修改：1.交换row/col引脚  2.恢复row2col为初始默认（注释掉）
[matrix]
row_pins = ["P0_09", "P0_10", "P1_11", "P1_06", "P0_11", "P1_04", "P1_00"]  # 原col_pins
col_pins = ["P1_07", "P1_02", "P1_01"]                                      # 原row_pins
# row2col = true  # 恢复初始默认：注释掉，使用RMK默认的col2row模式
debounce_time = 20

# 同步调整layout的rows/cols匹配交换后的引脚长度
[layout]
rows = 7  # 对应交换后的row_pins长度（7个）
cols = 3  # 对应交换后的col_pins长度（3个）
layers = 3
# 矩阵映射同步调整行列顺序（原(row,col)→新(col,row)），匹配你的键位需求
matrix_map = "(0,0,R) (1,0,R) (2,0,R) (3,0,R) (4,0,R) (5,0,R) (6,0,R) (0,1,R) (1,1,R) (2,1,R) (3,1,R) (4,1,R) (5,1,R) (6,1,R) (0,2,R) (1,2,R) (2,2,R) (3,2,R) (4,2,R) (5,2,R) (6,2,R)"

# 键位顺序完全匹配调整后的matrix_map，保留原始需求
[[layer]]
name = "base_layer"
keys = "F1 F3 F7 No No No MO(1) No W No I O P MO(2) A S D H J K L"

[[layer]]
name = "layer1"
keys = "No No No No No No No No No No No No No No No No No No No No No"

[[layer]]
name = "layer2"
keys = "No No No No No No No No No No No No No No No No No No No No No"

# 保留所有原始硬件/蓝牙配置
[ble]
enabled = true
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806
default_tx_power = 0
ble_use_2m_phy = true

[host]
vial_enabled = true
unlock_keys = [[0, 0], [1, 0]]  # 同步调整解锁键坐标

[rmk]
mouse_key_interval = 20
mouse_wheel_interval = 80
combo_max_num = 8
combo_max_length = 4
fork_max_num = 8
morse_max_num = 8
max_patterns_per_key = 36
macro_space_size = 256
event_channel_size = 16
controller_channel_size = 16
controller_channel_pubs = 12
controller_channel_subs = 8
report_channel_size = 16
vial_channel_size = 4
flash_channel_size = 4
split_peripherals_num = 1
ble_profiles_num = 3
split_central_sleep_timeout_seconds = 0

[chip.nrf52840]
dcdc_reg0 = true
dcdc_reg1 = true
dcdc_reg0_voltage = "3V3"
