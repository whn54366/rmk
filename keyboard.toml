# 最终可编译版 keyboard.toml（补全matrix_map + 兼容双层键位）
[keyboard]
name = "whn Keyboard"
product_name = "whn Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "wang"
serial_number = "vial:f64c2b3c:000001"
chip = "nrf52840"
usb_enable = true

# 直连模式核心配置
[matrix]
matrix_type = "direct_pin"
direct_pin_low_active = true
direct_pins = [
    ["P0_29", "P0_02", "P1_15", "_", "_", "P0_22", "P0_24"],
    ["_", "P1_13", "_", "P1_06", "P1_04", "P0_11", "_"],
    ["P0_09", "P0_10", "P1_11", "P1_07", "P1_02", "P1_01", "P1_00"]
]

# 布局配置：补全matrix_map（直连模式也需要！）
[layout]
rows = 3
cols = 7
layers = 2
# 补全matrix_map：按3行7列填写坐标，空位置用_（和direct_pins一一对应）
matrix_map = """
(0,0) (0,1) (0,2) _     _     (0,5) (0,6)
_     (1,1) _     (1,3) (1,4) (1,5) _
(2,0) (2,1) (2,2) (2,3) (2,4) (2,5) (2,6)
"""

# 层0：PLAYER1
[[layer]]
name = "PLAYER1"
keys = """
F1   F3   F7   No   No   TG(1)  TG(0)
No   W    No   I    O    P      No
A    S    D    H    J    K      L
"""

# 层1：PLAYER2
[[layer]]
name = "PLAYER2"
keys = """
F2   F4   F7   No   No   TG(1)  TG(0)
No   Up   No   Z    X    C      No
Left Down Right T    Y    U      I
"""

# BLE配置（RMK v0.6.0 标准）
[ble]
enabled = true
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806
default_tx_power = 0
ble_use_2m_phy = true

# Host配置（Vial）
[host]
vial_enabled = true
unlock_keys = [[0, 0], [0, 1]]

# RMK内部配置
[rmk]
debounce_time = 20
event_channel_size = 16
controller_channel_size = 16
report_channel_size = 16

# 芯片配置
[chip.nrf52840]
dcdc_reg0 = true
dcdc_reg1 = true
dcdc_reg0_voltage = "3V3"
